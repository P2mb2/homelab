  version: "3.7"
  services:
    nabu_openclaw_ts:
      image: tailscale/tailscale:latest
      container_name: nabu_openclaw_ts
      hostname: nabu_openclaw
      environment:
        - TS_AUTHKEY=${TS_AUTHKEY}
        - TS_EXTRA_ARGS=--advertise-tags=tag:container --reset
        - TS_SERVE_CONFIG=/config/nabuopenclaw.json
        - TS_STATE_DIR=/var/lib/tailscale
        - TS_USERSPACE=false
        - TS_ACCEPT_DNS=false
      dns:
        - 8.8.8.8
        - 1.1.1.1
      volumes:
        - /docs/nabuopenclaw/tailscale/config:/config
        - /docs/nabuopenclaw/tailscale/state:/var/lib/tailscale
        - /dev/net/tun:/dev/net/tun
      cap_add:
        - net_admin
        - sys_module
      restart: unless-stopped
      
    nabu_openclaw:
      # Official image:
      # image: ghcr.io/openclaw/openclaw:latest
      # Custom image (replace YOUR_GITHUB_USER with your lowercase GitHub username):
      image: ghcr.io/p2mb2/openclaw-custom:latest
      container_name: nabu_openclaw
      network_mode: service:nabu_openclaw_ts
      depends_on:
        - nabu_openclaw_ts
      volumes:
        - /docs/nabuopenclaw/data:/root/.openclaw
      environment:
        - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
        - OPENCLAW_GATEWAY_BIND=lan
      tty: true
      stdin_open: true
      restart: unless-stopped
